<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MINIB Project Pipeline</title>
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/main.css">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #2A2A2A 0%, #3a3a3a 100%);
      margin: 0;
    }
    .login-card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.3);
      width: 400px;
      overflow: hidden;
    }
    .login-header {
      background: #fff;
      padding: 40px 48px 20px;
      text-align: center;
      border-bottom: 4px solid #FFC600;
    }
    .login-header img {
      height: 60px;
      margin-bottom: 12px;
    }
    .login-sub {
      font-family: var(--font-family);
      font-size: 15px;
      font-weight: 600;
      color: #888;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .login-body {
      padding: 32px 40px 40px;
      background: #FAFAFA;
    }
    .lang-switch {
      display: flex;
      justify-content: center;
      gap: 6px;
      margin-bottom: 28px;
    }
    .lang-switch button {
      padding: 5px 16px;
      border: 1px solid #ddd;
      border-radius: 6px;
      background: #fff;
      color: #666;
      cursor: pointer;
      font-weight: 600;
      font-size: 13px;
      transition: all 0.2s;
    }
    .lang-switch button:hover {
      border-color: #FFC600;
      color: #333;
    }
    .lang-switch button.active {
      background: #FFC600;
      color: #2A2A2A;
      border-color: #FFC600;
    }
    .field-label {
      text-align: left;
      font-size: 11px;
      font-weight: 700;
      color: #999;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .login-card select, .login-card input[type="password"] {
      width: 100%;
      padding: 12px 14px;
      font-size: 15px;
      font-family: var(--font-family);
      border: 1px solid #ddd;
      border-radius: 8px;
      margin-bottom: 20px;
      box-sizing: border-box;
      background: #fff;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .login-card select { cursor: pointer; color: #333; }
    .login-card input[type="password"] { letter-spacing: 3px; }
    .login-card select:focus, .login-card input[type="password"]:focus {
      outline: none;
      border-color: #FFC600;
      box-shadow: 0 0 0 3px rgba(255,198,0,0.15);
    }
    .login-btn {
      width: 100%;
      padding: 13px;
      font-size: 15px;
      font-weight: 700;
      font-family: var(--font-family);
      background: #FFC600;
      color: #2A2A2A;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      letter-spacing: 0.5px;
    }
    .login-btn:hover { background: #e6b200; }
    .login-btn:active { transform: scale(0.98); }
    .error-msg {
      color: #d32f2f;
      font-size: 13px;
      margin-top: 12px;
      min-height: 18px;
      text-align: center;
    }
    .forgot-pw-link {
      display: block;
      text-align: center;
      margin-top: 16px;
      font-size: 13px;
      color: #888;
      text-decoration: none;
      cursor: pointer;
    }
    .forgot-pw-link:hover {
      color: #333;
      text-decoration: underline;
    }
    .forgot-pw-msg {
      display: none;
      margin-top: 12px;
      padding: 12px 14px;
      background: #FFF8E1;
      border: 1px solid #FFC600;
      border-radius: 8px;
      font-size: 13px;
      color: #444;
      text-align: center;
      line-height: 1.5;
    }
    .forgot-pw-msg a {
      color: #B8860B;
      font-weight: 700;
      text-decoration: none;
    }
    .forgot-pw-msg a:hover { text-decoration: underline; }
    .forgot-pw-msg.open { display: block; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-header">
      <img src="/img/minib-logo-claim-EN-nahled.jpg" alt="MINIB">
      <div class="login-sub">Project Pipeline MEA</div>
    </div>
    <div class="login-body">
      <div class="lang-switch">
        <button id="lang-cs" class="active" onclick="setLang('cs')">CZ</button>
        <button id="lang-en" onclick="setLang('en')">EN</button>
      </div>
      <div class="field-label" id="label-user"></div>
      <select id="user-select"></select>
      <div class="field-label" id="label-password"></div>
      <input type="password" id="password-input" autocomplete="current-password" minlength="4">
      <button class="login-btn" id="login-btn"></button>
      <div class="error-msg" id="error-msg"></div>
      <a class="forgot-pw-link" id="forgot-pw-link"></a>
      <div class="forgot-pw-msg" id="forgot-pw-msg"></div>
    </div>
  </div>
  <script src="/js/app.js"></script>
  <script>
    const T = {
      cs: {
        user: 'Uživatel', password: 'Heslo', selectUser: '— Vyberte uživatele —', btn: 'Vstoupit',
        error: 'Nesprávné přihlášení', connErr: 'Chyba spojení se serverem',
        forgotPw: 'Zapomenuté heslo?',
        forgotPwMsg: 'Pro reset hesla kontaktujte administrátora (Petr) na <a href="mailto:petr.hejtmanek@minib.cz">petr.hejtmanek@minib.cz</a>.',
      },
      en: {
        user: 'User', password: 'Password', selectUser: '— Select user —', btn: 'Enter',
        error: 'Incorrect login', connErr: 'Connection error',
        forgotPw: 'Forgot password?',
        forgotPwMsg: 'To reset your password, contact the administrator (Petr) at <a href="mailto:petr.hejtmanek@minib.cz">petr.hejtmanek@minib.cz</a>.',
      },
    };

    let lang = localStorage.getItem('minib_lang') || 'en';

    function setLang(l) {
      lang = l;
      localStorage.setItem('minib_lang', l);
      document.getElementById('lang-cs').classList.toggle('active', l === 'cs');
      document.getElementById('lang-en').classList.toggle('active', l === 'en');
      document.getElementById('label-user').textContent = T[l].user;
      document.getElementById('label-password').textContent = T[l].password;
      document.getElementById('login-btn').textContent = T[l].btn;
      document.getElementById('password-input').placeholder = T[l].password;
      document.getElementById('error-msg').textContent = '';
      const firstOpt = document.querySelector('#user-select option[value=""]');
      if (firstOpt) firstOpt.textContent = T[l].selectUser;
      document.getElementById('forgot-pw-link').textContent = T[l].forgotPw;
      document.getElementById('forgot-pw-msg').innerHTML = T[l].forgotPwMsg;
    }

    async function loadUsers() {
      try {
        const res = await fetch('/api/auth/users');
        const data = await res.json();
        const sel = document.getElementById('user-select');
        sel.innerHTML = '';
        const empty = document.createElement('option');
        empty.value = '';
        empty.textContent = T[lang].selectUser;
        sel.appendChild(empty);
        data.users.forEach(u => {
          const opt = document.createElement('option');
          opt.value = u.id;
          opt.textContent = u.name;
          sel.appendChild(opt);
        });
        const lastUserId = localStorage.getItem('minib_last_user');
        if (lastUserId && sel.querySelector(`option[value="${lastUserId}"]`)) {
          sel.value = lastUserId;
          document.getElementById('password-input').focus();
        }
      } catch (e) {
        console.error('Failed to load users', e);
      }
    }

    async function doLogin() {
      const userId = document.getElementById('user-select').value;
      const password = document.getElementById('password-input').value;
      const errEl = document.getElementById('error-msg');
      errEl.textContent = '';
      if (!userId) { errEl.textContent = T[lang].error; return; }
      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ userId: parseInt(userId), password }),
          credentials: 'include',
        });
        const data = await res.json();
        if (!res.ok) { errEl.textContent = T[lang].error; return; }
        localStorage.setItem('minib_last_user', userId);
        // A fresh login always starts a new session at the role default page,
        // regardless of ?next or where the user was before logging in. The
        // "return to last page" feature only applies within an already-
        // logged-in session — see App.init in app.js.
        App.clearLastPage(data.user.id);
        window.location.href = App.defaultLandingPage(data.user.role);
      } catch (e) {
        errEl.textContent = T[lang].connErr;
      }
    }

    document.getElementById('login-btn').addEventListener('click', doLogin);
    document.getElementById('password-input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') doLogin();
    });
    document.getElementById('forgot-pw-link').addEventListener('click', () => {
      document.getElementById('forgot-pw-msg').classList.toggle('open');
    });

    setLang(lang);
    loadUsers();
  </script>
</body>
</html>
