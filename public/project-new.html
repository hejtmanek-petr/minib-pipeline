<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MINIB Project Pipeline - New Project</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/responsive.css">
</head>
<body>
  <header id="app-header" class="app-header"></header>

  <div class="breadcrumb-bar">
    <a href="/dashboard.html" class="breadcrumb-back">&#8592; <span data-i18n="nav.dashboard"></span></a>
    <span class="breadcrumb-sep">/</span>
    <span class="breadcrumb-current" data-i18n="newProject.title"></span>
  </div>

  <main class="app-main">
    <div class="page-title">
      <h1 data-i18n="newProject.title"></h1>
      <button class="btn btn-secondary" id="import-btn" data-i18n="newProject.import"></button>
    </div>

    <!-- Základní informace -->
    <div class="card">
      <h3 data-i18n="project.section.basic"></h3>
      <div class="field-grid">
        <div class="form-group">
          <label data-i18n="project.field.country"></label>
          <select id="f-country"></select>
        </div>
        <div class="form-group">
          <label data-i18n="project.field.project_name"></label>
          <input type="text" id="f-project_name">
        </div>
        <div class="form-group">
          <label data-i18n="project.field.company"></label>
          <input type="text" id="f-company">
        </div>
        <div class="form-group">
          <label data-i18n="project.field.investor"></label>
          <input type="text" id="f-investor">
        </div>
        <div class="form-group">
          <label data-i18n="project.field.general_contractor"></label>
          <input type="text" id="f-general_contractor">
        </div>
        <div class="form-group">
          <label data-i18n="project.field.installation_company"></label>
          <input type="text" id="f-installation_company">
        </div>
        <div class="form-group">
          <label data-i18n="project.field.building_type"></label>
          <select id="f-building_type"></select>
        </div>
        <div class="form-group">
          <label data-i18n="project.field.owner"></label>
          <select id="f-owner"></select>
        </div>
        <div class="form-group">
          <label data-i18n="project.field.status"></label>
          <select id="f-status"></select>
        </div>
        <div class="form-group">
          <label data-i18n="project.field.phase"></label>
          <select id="f-phase"></select>
        </div>
        <div class="form-group">
          <label data-i18n="project.field.estimated_decision_date"></label>
          <div style="display:flex;gap:6px;" id="f-decision-wrap"></div>
        </div>
        <div class="form-group">
          <label data-i18n="project.field.estimated_delivery_date"></label>
          <div style="display:flex;gap:6px;" id="f-delivery-wrap"></div>
        </div>
        <div class="form-group" style="grid-column: 1 / -1;">
          <label data-i18n="project.field.products_and_quantity"></label>
          <textarea id="f-products_and_quantity" rows="2"></textarea>
        </div>
        <div class="form-group" style="grid-column: 1 / -1;">
          <label data-i18n="project.field.competition"></label>
          <input type="text" id="f-competition">
        </div>
        <div class="form-group" style="grid-column: 1 / -1;">
          <label data-i18n="project.field.current_status_note"></label>
          <textarea id="f-current_status_note" rows="2"></textarea>
        </div>
      </div>
    </div>

    <!-- Obchodní hodnoty -->
    <div class="card">
      <h3 data-i18n="project.section.commercial"></h3>
      <div class="field-grid">
        <div class="form-group">
          <label data-i18n="project.field.project_value_eur"></label>
          <div style="display:flex;align-items:center;gap:6px;">
            <input type="text" id="f-project_value_eur">
            <span style="font-weight:600;color:var(--color-text-muted);">€</span>
          </div>
        </div>
        <div class="form-group">
          <label data-i18n="project.field.project_value_local"></label>
          <div style="display:flex;align-items:center;gap:6px;">
            <input type="text" id="f-project_value_local">
            <span style="font-weight:600;color:var(--color-text-muted);">Kč</span>
          </div>
        </div>
      </div>
    </div>

    <div style="padding: 0 0 24px;">
      <button type="button" id="btn-create" class="btn btn-primary" data-i18n="newProject.create"></button>
    </div>
  </main>

  <!-- Import Modal -->
  <div class="modal-overlay" id="import-modal" style="display:none;">
    <div class="modal">
      <div class="modal-header">
        <h2 data-i18n="newProject.importTitle"></h2>
        <button class="modal-close" id="close-import">&times;</button>
      </div>
      <div class="form-group">
        <label data-i18n="newProject.selectFile"></label>
        <input type="file" id="import-file" accept=".xlsx,.xls">
      </div>
      <div id="import-preview"></div>
    </div>
  </div>

  <script src="/js/i18n.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/project-new.js"></script>
</body>
</html>
