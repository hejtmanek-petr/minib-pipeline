<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MINIB Project Pipeline - Users</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/responsive.css">
</head>
<body>
  <header id="app-header" class="app-header"></header>

  <main class="app-main">
    <div class="page-title">
      <h1 data-i18n="admin.users.title"></h1>
      <button class="btn btn-primary" id="add-user-btn" data-i18n="admin.users.add"></button>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th data-i18n="admin.users.email"></th>
            <th data-i18n="admin.users.name"></th>
            <th data-i18n="admin.users.role"></th>
            <th data-i18n="admin.users.countries"></th>
            <th data-i18n="admin.users.active"></th>
            <th data-i18n="common.actions"></th>
          </tr>
        </thead>
        <tbody id="users-tbody"></tbody>
      </table>
    </div>
  </main>

  <!-- Add/Edit User Modal -->
  <div class="modal-overlay" id="user-modal" style="display:none;">
    <div class="modal">
      <div class="modal-header">
        <h2 data-i18n="admin.users.add"></h2>
        <button class="modal-close" id="close-user-modal">&times;</button>
      </div>
      <form id="user-form">
        <input type="hidden" id="u-id">
        <div class="form-group">
          <label data-i18n="admin.users.email"></label>
          <input type="email" id="u-email" required>
        </div>
        <div class="form-group">
          <label data-i18n="admin.users.name"></label>
          <input type="text" id="u-name" required>
        </div>
        <div class="form-group">
          <label data-i18n="admin.users.role"></label>
          <select id="u-role">
            <option value="DEALER">DEALER</option>
            <option value="HQ">HQ</option>
          </select>
        </div>
        <div class="form-group">
          <label data-i18n="admin.users.countries"></label>
          <input type="text" id="u-countries" placeholder="TR,AZ,UZ">
        </div>
        <div class="form-group">
          <label data-i18n="profile.language"></label>
          <select id="u-lang">
            <option value="en">EN</option>
            <option value="cs">CS</option>
          </select>
        </div>
        <button type="submit" class="btn btn-primary" data-i18n="common.save"></button>
      </form>
      <div id="generated-password" class="success-message" style="display:none;"></div>
    </div>
  </div>

  <script src="/js/i18n.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/admin.js"></script>
</body>
</html>
