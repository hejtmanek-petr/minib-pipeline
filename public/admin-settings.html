<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MINIB Project Pipeline - Settings</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/responsive.css">
  <style>
    .users-table { width:100%; border-collapse:collapse; font-size:13px; }
    .users-table th { background:#FAFAFA; color:#888; font-size:11px; text-transform:uppercase; letter-spacing:0.5px; padding:10px 12px; text-align:left; border-bottom:2px solid #f0f0f0; }
    .users-table td { padding:10px 12px; border-bottom:1px solid #f5f5f5; }
    .users-table tr:hover td { background:#FFFDE7; }
    .pw-value { font-family:monospace; background:#f5f5f5; padding:2px 8px; border-radius:4px; font-size:13px; }
    .role-badge { padding:2px 8px; border-radius:4px; font-size:11px; font-weight:600; }
    .role-admin { background:#FFC600; color:#2A2A2A; }
    .role-mea_management { background:#E3F2FD; color:#1565C0; }
    .role-mea_sales { background:#F5F5F5; color:#666; }
    .login-time { font-size:12px; color:#888; }
    .login-name { font-weight:600; }
    .see-all-link { color:#1565C0; font-weight:600; font-size:13px; cursor:pointer; text-decoration:none; }
    .see-all-link:hover { text-decoration:underline; }
    .history-full { display:none; }
    .history-full.open { display:block; }
    .device-info { font-size:11px; color:#aaa; max-width:300px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  </style>
</head>
<body>
  <header id="app-header" class="app-header"></header>

  <main class="app-main">
    <div class="page-title">
      <h1 data-i18n="admin.settings.title"></h1>
    </div>

    <!-- User Passwords -->
    <div class="card" id="sec-users">
      <h3 data-i18n="admin.settings.accounts"></h3>
      <div class="table-wrap">
        <table class="users-table" id="users-table">
          <thead><tr><th data-i18n="admin.settings.colName"></th><th data-i18n="admin.settings.colRole"></th><th data-i18n="admin.settings.colPassword"></th></tr></thead>
          <tbody id="users-tbody"></tbody>
        </table>
      </div>
    </div>

    <!-- Login History -->
    <div class="card" id="sec-login-history">
      <h3 data-i18n="admin.settings.recentLogins"></h3>
      <div id="recent-logins"></div>
      <div style="margin-top:12px;">
        <a class="see-all-link" id="toggle-full-history" data-i18n="admin.settings.showFullHistory"></a>
      </div>
      <div class="history-full" id="full-history">
        <div style="margin:12px 0 8px;">
          <label style="font-size:11px; color:#999; text-transform:uppercase; font-weight:600;" data-i18n="admin.settings.filterByUser"></label>
          <select id="history-user-filter" style="padding:6px 10px; font-size:13px; border:1px solid #ddd; border-radius:6px; margin-left:8px;">
            <option value="" data-i18n="admin.settings.allUsers"></option>
          </select>
        </div>
        <div class="table-wrap" style="max-height:400px; overflow-y:auto;">
          <table class="users-table">
            <thead><tr><th data-i18n="admin.settings.colUser"></th><th data-i18n="admin.settings.colDateTime"></th><th data-i18n="admin.settings.colIp"></th><th data-i18n="admin.settings.colDevice"></th></tr></thead>
            <tbody id="history-tbody"></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- Číselníky -->
    <div class="card">
      <h3 data-i18n="admin.settings.countries"></h3>
      <div class="form-group">
        <input type="text" id="s-countries">
      </div>
      <button class="btn btn-primary save-list" data-key="countries" data-i18n="common.save"></button>
    </div>

    <div class="card">
      <h3 data-i18n="admin.settings.buildingTypes"></h3>
      <div class="form-group">
        <input type="text" id="s-building_types">
      </div>
      <button class="btn btn-primary save-list" data-key="building_types" data-i18n="common.save"></button>
    </div>

    <div class="card">
      <h3 data-i18n="admin.settings.phases"></h3>
      <div class="form-group">
        <input type="text" id="s-phases">
      </div>
      <button class="btn btn-primary save-list" data-key="phases" data-i18n="common.save"></button>
    </div>

    <div class="card">
      <h3 data-i18n="admin.settings.statuses"></h3>
      <div class="form-group">
        <input type="text" id="s-statuses">
      </div>
      <button class="btn btn-primary save-list" data-key="statuses" data-i18n="common.save"></button>
    </div>

    <!-- Backups (admin only) -->
    <div class="card" id="sec-backup" style="display:none;">
      <h3 data-i18n="admin.backup.title"></h3>
      <p class="text-muted" style="font-size:13px;" data-i18n="admin.backup.autoNote"></p>
      <div style="display:flex; gap:10px; align-items:flex-end; flex-wrap:wrap; margin-bottom:16px;">
        <div>
          <input type="text" id="backup-label" style="padding:8px 12px; font-size:13px; border:1px solid #ddd; border-radius:6px; width:240px;" data-i18n-placeholder="admin.backup.labelPlaceholder">
        </div>
        <button class="btn btn-primary" id="btn-create-snapshot" data-i18n="admin.backup.createSnapshot"></button>
        <a id="btn-download-backup" class="btn btn-secondary" href="/api/admin/backup/download" download data-i18n="admin.backup.download"></a>
        <a id="btn-export-csv" class="btn btn-secondary" href="/api/admin/backup/export-csv" download data-i18n="admin.backup.exportCsv"></a>
      </div>
      <div id="snapshots-container"></div>
    </div>

    <!-- Settings Change History -->
    <div class="card" id="sec-settings-history">
      <h3><span data-i18n="admin.settings.changeHistory"></span> <span class="text-muted" style="font-size:12px;" data-i18n="admin.settings.last3Months"></span></h3>
      <div id="settings-history-content"></div>
    </div>
  </main>

  <script src="/js/i18n.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/admin.js"></script>
  <script>
    (async () => {
      await I18N.load(I18N.getLang());
      I18N.applyTranslations(document);

      // Load user passwords
      try {
        const res = await App.api('/auth/admin/users');
        const tbody = document.getElementById('users-tbody');
        tbody.innerHTML = res.users.map(u => `
          <tr>
            <td><strong>${u.name}</strong></td>
            <td><span class="role-badge role-${u.access_role}">${u.access_role}</span></td>
            <td>${u.password_plain ? `<span class="pw-value">${u.password_plain}</span>` : '<span style="color:#aaa;">—</span>'}</td>
          </tr>
        `).join('');
      } catch (e) {
        document.getElementById('sec-users').style.display = 'none';
      }

      // Load login history
      try {
        const res = await App.api('/auth/admin/login-history?limit=500');
        const history = res.history;

        // Recent 3
        const recent = history.slice(0, 3);
        document.getElementById('recent-logins').innerHTML = recent.length
          ? recent.map(h => `
            <div style="display:flex; align-items:center; gap:12px; padding:8px 0; border-bottom:1px solid #f5f5f5;">
              <span class="login-name">${h.user_name}</span>
              <span class="login-time">${App.fmtDateTime(h.created_at)}</span>
            </div>
          `).join('')
          : `<span style="color:#aaa;">${I18N.t('admin.settings.noLogins')}</span>`;

        const tbody = document.getElementById('history-tbody');

        // Populate user filter
        const userNames = [...new Set(history.map(h => h.user_name))].sort();
        const filterSel = document.getElementById('history-user-filter');
        userNames.forEach(n => { const o = document.createElement('option'); o.value = n; o.textContent = n; filterSel.appendChild(o); });

        function renderHistory(filter) {
          const filtered = filter ? history.filter(h => h.user_name === filter) : history;
          tbody.innerHTML = filtered.map(h => {
            const ua = h.user_agent || '';
            let device = 'Unknown';
            if (ua.includes('iPhone') || ua.includes('Android')) device = 'Mobile';
            else if (ua.includes('iPad') || ua.includes('Tablet')) device = 'Tablet';
            else if (ua.includes('Mac') || ua.includes('Windows') || ua.includes('Linux')) device = 'Desktop';
            const browser = ua.match(/(Chrome|Safari|Firefox|Edge|Opera)[\/\s](\d+)/);
            if (browser) device += ' / ' + browser[1];
            return `<tr><td><strong>${h.user_name}</strong></td><td>${App.fmtDateTime(h.created_at)}</td><td style="font-size:12px;color:#888;">${h.ip || '-'}</td><td class="device-info" title="${ua}">${device}</td></tr>`;
          }).join('') || `<tr><td colspan="4" style="text-align:center;color:#aaa;">${I18N.t('admin.settings.noLogins')}</td></tr>`;
        }

        filterSel.addEventListener('change', () => renderHistory(filterSel.value));
        renderHistory('');

        document.getElementById('toggle-full-history').addEventListener('click', (e) => {
          e.preventDefault();
          const el = document.getElementById('full-history');
          el.classList.toggle('open');
          e.target.textContent = el.classList.contains('open') ? I18N.t('admin.settings.hideFullHistory') : I18N.t('admin.settings.showFullHistory');
        });
      } catch (e) {
        document.getElementById('sec-login-history').style.display = 'none';
      }

      // Backup section (admin only)
      const user = App.getUser();
      if (user && user.role === 'admin') {
        document.getElementById('sec-backup').style.display = '';

        async function loadSnapshots() {
          const res = await App.api('/admin/backup/snapshots');
          const container = document.getElementById('snapshots-container');
          if (!res.snapshots.length) {
            container.innerHTML = `<span class="text-muted">${I18N.t('admin.backup.noSnapshots')}</span>`;
            return;
          }
          container.innerHTML = `
            <div class="table-wrap" style="max-height:400px; overflow-y:auto;">
              <table class="users-table" id="snapshots-table">
                <thead><tr>
                  <th data-i18n="admin.backup.colLabel"></th>
                  <th data-i18n="admin.backup.colDate"></th>
                  <th data-i18n="admin.backup.colProjects"></th>
                  <th></th>
                </tr></thead>
                <tbody>${res.snapshots.map(s => {
                  const isAuto = s.label.startsWith('auto:');
                  const labelDisplay = isAuto ? '🕐 ' + s.label.replace('auto:', '') : '📌 ' + s.label.replace('manual:', '');
                  return `<tr>
                    <td>${labelDisplay}</td>
                    <td>${App.fmtDateTime(s.created_at)}</td>
                    <td style="text-align:center;">${s.projects_count || '—'}</td>
                    <td style="white-space:nowrap;">
                      <button class="btn btn-secondary btn-restore" data-id="${s.id}" style="font-size:12px; padding:4px 10px; margin-right:4px;">${I18N.t('admin.backup.restore')}</button>
                      <button class="btn btn-danger btn-snap-delete" data-id="${s.id}" style="font-size:12px; padding:4px 10px;">${I18N.t('admin.backup.delete')}</button>
                    </td>
                  </tr>`;
                }).join('')}</tbody>
              </table>
            </div>
          `;
          I18N.applyTranslations(container);
          container.querySelectorAll('.btn-restore').forEach(btn => {
            btn.addEventListener('click', async () => {
              if (!confirm(I18N.t('admin.backup.restoreConfirm'))) return;
              btn.textContent = I18N.t('admin.backup.restoring');
              btn.disabled = true;
              try {
                await App.api(`/admin/backup/restore/${btn.dataset.id}`, { method: 'POST' });
                alert(I18N.t('admin.backup.restored'));
              } catch (e) {
                alert(e.message || 'Error');
                btn.textContent = I18N.t('admin.backup.restore');
                btn.disabled = false;
              }
            });
          });
          container.querySelectorAll('.btn-snap-delete').forEach(btn => {
            btn.addEventListener('click', async () => {
              if (!confirm(I18N.t('admin.backup.deleteConfirm'))) return;
              await App.api(`/admin/backup/snapshot/${btn.dataset.id}`, { method: 'DELETE' });
              loadSnapshots();
            });
          });
        }

        document.getElementById('btn-create-snapshot').addEventListener('click', async () => {
          const btn = document.getElementById('btn-create-snapshot');
          const label = document.getElementById('backup-label').value.trim();
          btn.textContent = I18N.t('admin.backup.creating');
          btn.disabled = true;
          try {
            await App.api('/admin/backup/snapshot', { method: 'POST', body: { label } });
            document.getElementById('backup-label').value = '';
            await loadSnapshots();
            btn.textContent = I18N.t('admin.backup.created');
            setTimeout(() => { btn.textContent = I18N.t('admin.backup.createSnapshot'); btn.disabled = false; }, 2000);
          } catch (e) {
            alert(e.message || 'Error');
            btn.textContent = I18N.t('admin.backup.createSnapshot');
            btn.disabled = false;
          }
        });

        await loadSnapshots();
      }

      // Load settings change history
      try {
        const res = await App.api('/admin/settings-history');
        const container = document.getElementById('settings-history-content');
        if (res.history.length) {
          container.innerHTML = `
            <div class="table-wrap" style="max-height:400px; overflow-y:auto;">
              <table class="users-table">
                <thead><tr><th>${I18N.t('admin.settings.colUser')}</th><th>${I18N.t('admin.settings.colSetting')}</th><th>${I18N.t('admin.settings.colOldValue')}</th><th>${I18N.t('admin.settings.colNewValue')}</th><th>${I18N.t('admin.settings.colDateTime')}</th></tr></thead>
                <tbody>${res.history.map(h => `
                  <tr>
                    <td><strong>${h.user_name || '-'}</strong></td>
                    <td><span class="role-badge role-mea_management">${h.setting_key}</span></td>
                    <td style="max-width:200px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-size:12px; color:#888;" title="${(h.old_value || '').replace(/"/g, '&quot;')}">${h.old_value || '-'}</td>
                    <td style="max-width:200px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-size:12px;" title="${(h.new_value || '').replace(/"/g, '&quot;')}">${h.new_value || '-'}</td>
                    <td>${App.fmtDateTime(h.created_at)}</td>
                  </tr>
                `).join('')}</tbody>
              </table>
            </div>
          `;
        } else {
          container.innerHTML = `<span class="text-muted">${I18N.t('admin.settings.noChanges')}</span>`;
        }
      } catch (e) {
        document.getElementById('sec-settings-history').style.display = 'none';
      }
    })();
  </script>
</body>
</html>
