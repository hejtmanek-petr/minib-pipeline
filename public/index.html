<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MINIB Project Pipeline</title>
  <script src="/js/app.js"></script>
  <script>
    (async () => {
      try {
        const res = await fetch('/api/auth/me', { credentials: 'include' });
        if (res.ok) {
          const data = await res.json();
          const user = data.user;
          const target = (user && App.getLastPage(user.id)) || App.defaultLandingPage(user && user.role);
          window.location.replace(target);
        } else {
          window.location.replace('/login.html');
        }
      } catch (e) {
        window.location.replace('/login.html');
      }
    })();
  </script>
</head>
<body>
</body>
</html>
