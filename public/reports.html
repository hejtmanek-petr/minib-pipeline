<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MINIB Project Pipeline - Reports</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/responsive.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    .report-tabs { display:flex; gap:4px; margin-bottom:20px; flex-wrap:wrap; }
    .report-tab { padding:10px 18px; border:none; background:#f0f0f0; color:#666; font-weight:600; font-size:13px; border-radius:8px 8px 0 0; cursor:pointer; transition:all 0.2s; }
    .report-tab:hover { background:#e0e0e0; color:#333; }
    .report-tab.active { background:#FFC600; color:#2A2A2A; }
    .report-section { display:none; }
    .report-section.active { display:block; }
    .report-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:16px; }
    .report-grid-3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:16px; margin-bottom:16px; }
    .chart-card { background:#fff; border-radius:10px; padding:20px; box-shadow:0 1px 6px rgba(0,0,0,0.06); }
    .chart-card h4 { margin:0 0 12px; font-size:14px; color:#888; text-transform:uppercase; letter-spacing:0.5px; }
    .chart-wrap { position:relative; height:280px; }
    .stat-card { background:#fff; border-radius:10px; padding:20px; box-shadow:0 1px 6px rgba(0,0,0,0.06); text-align:center; }
    .stat-value { font-size:28px; font-weight:900; color:#2A2A2A; margin:8px 0 4px; }
    .stat-value.yellow { color:#D4A800; }
    .stat-value.green { color:#2E7D32; }
    .stat-value.red { color:#C0272D; }
    .stat-label { font-size:11px; color:#999; text-transform:uppercase; letter-spacing:0.5px; font-weight:600; }
    .report-table { width:100%; border-collapse:collapse; font-size:13px; }
    .report-table th { background:#FAFAFA; color:#888; font-size:11px; text-transform:uppercase; letter-spacing:0.5px; padding:10px 12px; text-align:left; border-bottom:2px solid #f0f0f0; }
    .report-table td { padding:10px 12px; border-bottom:1px solid #f5f5f5; }
    .report-table tr:hover td { background:#FFFDE7; }
    .report-table .money { text-align:right; font-weight:600; }
    .report-table .num { text-align:center; }
    .bar-inline { display:inline-block; height:8px; border-radius:4px; vertical-align:middle; margin-left:6px; }
    .filters-row { display:flex; gap:12px; margin-bottom:16px; flex-wrap:wrap; align-items:flex-end; }
    .filters-row .form-group { min-width:120px; margin:0; }
    .filters-row label { font-size:11px; color:#999; text-transform:uppercase; font-weight:600; margin-bottom:2px; display:block; }
    .filters-row select, .filters-row input { padding:6px 10px; font-size:13px; border:1px solid #ddd; border-radius:6px; }
    .stale-tag { background:#FFF3E0; color:#E65100; padding:2px 8px; border-radius:4px; font-size:11px; font-weight:600; }
    .overdue-tag { background:#FFEBEE; color:#C0272D; padding:2px 8px; border-radius:4px; font-size:11px; font-weight:600; }
    @media(max-width:768px) {
      .report-grid, .report-grid-3 { grid-template-columns:1fr; }
      .report-tabs { gap:2px; }
      .report-tab { padding:8px 12px; font-size:12px; }
      .chart-wrap { height:220px; }
      .stat-value { font-size:22px; }
      .filters-row { flex-direction:column; }
    }
  </style>
</head>
<body>
  <header id="app-header" class="app-header"></header>

  <main class="app-main">
    <div class="page-title">
      <h1 data-i18n="reports.title"></h1>
    </div>

    <div class="filters-row" id="report-filters">
      <div class="form-group">
        <label>Owner</label>
        <select id="f-owner"><option value="">All</option></select>
      </div>
      <div class="form-group">
        <label>Status</label>
        <select id="f-status">
          <option value="">All</option>
          <option value="active">Active</option>
          <option value="won">Won</option>
          <option value="lost">Lost</option>
        </select>
      </div>
      <div class="form-group">
        <label>Country</label>
        <select id="f-country"><option value="">All</option></select>
      </div>
    </div>

    <div class="report-tabs" id="report-tabs">
      <button class="report-tab active" data-tab="overview">Overview</button>
      <button class="report-tab" data-tab="geography">Geography</button>
      <button class="report-tab" data-tab="owners">Owners</button>
      <button class="report-tab" data-tab="forecast">Forecast</button>
      <button class="report-tab" data-tab="timeline">Timeline</button>
      <button class="report-tab" data-tab="activity">Activity</button>
    </div>

    <div class="report-section active" id="sec-overview"></div>
    <div class="report-section" id="sec-geography"></div>
    <div class="report-section" id="sec-owners"></div>
    <div class="report-section" id="sec-forecast"></div>
    <div class="report-section" id="sec-timeline"></div>
    <div class="report-section" id="sec-activity"></div>
  </main>

  <script src="/js/i18n.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/reports.js"></script>
</body>
</html>
