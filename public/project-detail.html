<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MINIB Project Pipeline - Project Detail</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/responsive.css">
</head>
<body>
  <header id="app-header" class="app-header"></header>

  <div class="breadcrumb-bar">
    <a href="/dashboard.html" class="breadcrumb-back">&#8592; <span data-i18n="nav.dashboard"></span></a>
    <span class="breadcrumb-sep">/</span>
    <span class="breadcrumb-current" id="breadcrumb-project-name"></span>
    <a href="/dashboard.html" class="btn btn-primary" style="margin-left:auto;">&#8592; Overview</a>
    <button id="btn-delete-project" class="btn btn-danger">&#128465; Delete project</button>
  </div>

  <main class="app-main">
    <div class="page-title" style="display:none;">
      <h1 id="project-title" data-i18n="project.title"></h1>
    </div>

    <!-- Section A: Basic info -->
    <div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;">
        <h3 data-i18n="project.section.basic" style="margin-bottom:0;"></h3>
        <span id="auto-save-status" style="font-size:12px;font-weight:600;opacity:0;transition:opacity 0.4s;"></span>
      </div>
      <button class="btn btn-primary save-basic-trigger" data-i18n="common.save" style="margin-bottom:12px;"></button>
      <div class="field-grid" id="basic-fields"></div>
      <button class="btn btn-primary save-basic-trigger" data-i18n="common.save" style="margin-top:12px;"></button>
    </div>

    <!-- Section B: Commercial values -->
    <div class="card" data-visibility="hq-only">
      <h3 data-i18n="project.section.commercial"></h3>
      <div class="field-grid" id="commercial-fields"></div>
      <button class="btn btn-primary" id="save-commercial-btn" data-i18n="common.save" style="margin-top:12px;"></button>

      <div id="ai-estimate-section" style="display:none; margin-top:20px; padding-top:16px; border-top:1px solid var(--border);">
        <div style="display:flex; align-items:center; gap:16px; flex-wrap:wrap;">
          <div>
            <div class="field-label" style="font-size:0.78rem; color:var(--text-muted); margin-bottom:4px;">🤖 AI value (estimate from products)</div>
            <div id="ai-value-display" style="font-size:1.1rem; font-weight:600;">—</div>
          </div>
          <div id="ai-value-breakdown" style="font-size:0.82rem; color:var(--text-muted); max-width:400px;"></div>
          <button id="btn-estimate-value" class="btn btn-secondary" style="margin-left:auto;">🤖 Estimate AI value</button>
        </div>
      </div>
    </div>

    <!-- Section C: Win probability -->
    <div class="card">
      <h3 data-i18n="project.section.winprob"></h3>
      <div class="winprob-grid">
        <div>
          <div class="gauge-label" data-i18n="winprob.manual"></div>
          <div class="gauge-bar"><div class="gauge-fill" id="manual-gauge-fill"></div></div>
          <div id="manual-gauge-value" class="gauge-label">-</div>
          <div style="margin-top:12px;">
            <div style="display:flex; align-items:center; gap:12px;">
              <input type="range" id="manual-prob" min="0" max="100" step="5" style="flex:1; cursor:pointer; accent-color:#FFA500;">
              <span id="manual-prob-display" style="font-size:1.1em; font-weight:700; min-width:42px; text-align:right;">-</span>
            </div>
          </div>
          <button class="btn btn-primary" id="save-manual-prob" data-i18n="common.save" style="margin-top:8px;"></button>
        </div>
        <div>
          <div class="gauge-label" data-i18n="winprob.ai"></div>
          <div class="gauge-bar"><div class="gauge-fill" id="ai-gauge-fill"></div></div>
          <div id="ai-gauge-value" class="gauge-label">-</div>
          <button class="btn btn-secondary" id="ask-ai-btn" style="margin-top:8px;">🤖 <span data-i18n="winprob.askAi"></span></button>
          <div id="ai-spinner" class="text-muted" style="display:none; margin-top:8px;" data-i18n="winprob.aiThinking"></div>
          <div id="ai-updated" class="text-muted" style="margin-top:8px; font-size:12px;"></div>
          <div id="ai-reasoning-wrap" style="display:none; margin-top:10px;">
            <div class="comment-lang-bar" id="ai-reasoning-lang-bar" style="margin-bottom:6px;">
              <button class="comment-lang-btn active" data-lang="en">EN</button>
              <button class="comment-lang-btn" data-lang="cs">CS</button>
              <button class="comment-lang-btn" data-lang="tr">TR</button>
            </div>
            <div class="ai-reasoning" id="ai-reasoning"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Section D: Voice input + Comments -->
    <div class="card">
      <div id="voice-section">
        <h3 style="display:inline;"><span data-i18n="comments.voiceInput"></span></h3> <span class="text-muted" style="font-size:16px;">(max 5 min)</span>
        <div class="voice-langs">
          <button data-lang="cs">🇨🇿 CS</button>
          <button data-lang="en" class="active">🇬🇧 EN</button>
          <button data-lang="tr">🇹🇷 TR</button>
        </div>
        <div class="voice-input-area">
          <button class="mic-button" id="mic-btn">🎤</button>
          <div id="voice-status" class="text-muted" data-i18n="comments.startRecording"></div>
          <div class="live-transcript" id="live-transcript"></div>
        </div>
        <div class="form-group" id="voice-result-area" style="display:none; margin-top:10px;">
          <label data-i18n="comments.transcript"></label>
          <textarea id="voice-transcript-text" rows="3"></textarea>
          <button class="btn btn-primary" id="save-voice-comment" data-i18n="comments.saveVoice" style="margin-top:8px;"></button>
        </div>
        <div id="voice-not-supported" class="error-message" style="display:none;" data-i18n="comments.notSupported"></div>
      </div>

      <div class="form-group" style="margin-top:20px;">
        <label data-i18n="comments.add"></label>
        <input type="text" id="comment-title" data-i18n-placeholder="comments.titlePlaceholder" style="margin-bottom:6px;">
        <textarea id="comment-text" rows="3" data-i18n-placeholder="comments.placeholder"></textarea>
        <button class="btn btn-primary" id="add-comment-btn" data-i18n="comments.addText" style="margin-top:8px;"></button>
      </div>

      <h3 data-i18n="project.section.comments" style="margin-top:24px;"></h3>
      <div class="comment-feed" id="comment-feed"></div>
      <button class="btn btn-primary save-basic-trigger" data-i18n="common.save" style="margin-top:16px;"></button>
    </div>


    <!-- Section F: History -->
    <div class="card" id="history-section">
      <h3 data-i18n="project.section.history"></h3>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th data-i18n="history.field"></th>
              <th data-i18n="history.oldValue"></th>
              <th data-i18n="history.newValue"></th>
              <th data-i18n="history.changedBy"></th>
              <th data-i18n="history.changedAt"></th>
            </tr>
          </thead>
          <tbody id="history-tbody"></tbody>
        </table>
      </div>
    </div>
  </main>

  <script src="/js/i18n.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/voice.js"></script>
  <script src="/js/project-detail.js"></script>
</body>
</html>
